version: '3.8'
services:
  postgres-kelompok2:
    image: postgres:15
    container_name: postgres-kelompok2
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./data/raw/stock_transactions.sql:/stock_transactions.sql

  minio-kelompok2:
    image: minio/minio
    container_name: minio-kelompok2
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  mc-kelompok2:
    image: minio/mc
    container_name: mc-kelompok2
    depends_on:
      - minio-kelompok2
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc config host add local http://minio-kelompok2:9000 minioadmin minioadmin) do echo 'Waiting for MinIO...' && sleep 1; done;
      exit 0;
      "